<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Number Guessing Game</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🎯 Number Guessing Game</h1>

    <p>
      Guess a number between <strong>1 and 10</strong>
    </p>

    <p>
      You have only <strong>5 attempts</strong>
    </p>

    <input
      type="number"
      id="guessInput"
      placeholder="Enter Number"
      min="1"
      max="10"
    >

    <button onclick="checkGuess()">
      Check Guess
    </button>

    <button onclick="resetGame()">
      Reset Game
    </button>

    <h2 id="message"></h2>

    <p id="attempts"></p>

  </div>

  <script src="script.js"></script>

</body>
</html>
