<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1 - Change Text with JavaScript</title>
</head>
<body>
    <h1>Change Text with JavaScript</h1>
    <p id="myText">Old Text</p>
    <p>The paragraph above will change to "New Text" when this page loads.</p>

    <!-- Internal JavaScript -->
    <script>
        // This script runs when the page loads
        // It changes the text of the paragraph with id="myText"

        // Step 1: Get the HTML element by its ID
        let textElement = document.getElementById("myText");

        // Step 2: Change the text content
        textElement.textContent = "New Text";

        // Step 3: Log to console to verify
        console.log("Text changed successfully!");
    </script>
</body>
</html>
